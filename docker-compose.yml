services:
  gitlab:
    image: ${GITLAB_IMAGE}
    container_name: gitlab
    hostname: ${GITLAB_HOSTNAME}
    restart: unless-stopped
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOSTNAME}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
    ports:
      - "${GITLAB_HTTP_PORT}:80"
      - "${GITLAB_HTTPS_PORT}:443"
      - "${GITLAB_SSH_PORT}:22"
    volumes:
      - ./gitlab/config:/etc/gitlab
      - ./gitlab/logs:/var/log/gitlab
      - ./gitlab/data:/var/opt/gitlab
    shm_size: 256m
    networks:
      - hub_net

  redmine:
    image: ${REDMINE_IMAGE}
    container_name: redmine
    restart: unless-stopped
    user: "${GIT_UID}:${GIT_GID}"
    depends_on:
      - gitlab
    ports:
      - "${REDMINE_PORT}:3000"
    volumes:
      - ./redmine/files:/usr/src/redmine/files
      - ./redmine/plugins:/usr/src/redmine/plugins
      - ./redmine/themes:/usr/src/redmine/themes
      - ./redmine/log:/usr/src/redmine/log
      - ./redmine/sqlite:/usr/src/redmine/sqlite
      - ./gitlab/data/git-data/repositories:/var/redmine/repositories:ro
    networks:
      - hub_net

networks:
  hub_net:
    driver: bridge
