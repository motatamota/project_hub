services:
  gitlab:
    image: ${GITLAB_IMAGE}
    container_name: gitlab
    hostname: ${GITLAB_HOSTNAME}
    restart: unless-stopped
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOSTNAME}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
    ports:
      - "${GITLAB_HTTP_PORT}:80"
      - "${GITLAB_HTTPS_PORT}:443"
      - "${GITLAB_SSH_PORT}:22"
    volumes:
      - ./gitlab/config:/etc/gitlab
      - ./gitlab/logs:/var/log/gitlab
      - ./gitlab/data:/var/opt/gitlab
    shm_size: 256m
    networks:
      - hub_net

  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: redmine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./redmine/postgres:/var/lib/postgresql/data
    networks:
      - hub_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redmine:
    image: ${REDMINE_IMAGE}
    container_name: redmine
    restart: unless-stopped
    user: "${GIT_UID}:${GIT_GID}"
    depends_on:
      postgres:
        condition: service_healthy
      gitlab:
        condition: service_started
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_PORT: 5432
      REDMINE_DB_DATABASE: ${POSTGRES_DB}
      REDMINE_DB_USERNAME: ${POSTGRES_USER}
      REDMINE_DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${REDMINE_PORT}:3000"
    volumes:
      - ./redmine/files:/usr/src/redmine/files
      - ./redmine/plugins:/usr/src/redmine/plugins
      - ./redmine/themes:/usr/src/redmine/themes
      - ./redmine/log:/usr/src/redmine/log
      - ./gitlab/data/git-data/repositories:/var/redmine/repositories:ro
    networks:
      - hub_net

networks:
  hub_net:
    driver: bridge
